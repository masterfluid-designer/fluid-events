services:
  # ============ PostgreSQL ============
  postgres:
    image: postgres:16-alpine
    container_name: fluid-events-postgres
    environment:
      POSTGRES_USER: fluid_user
      POSTGRES_PASSWORD: fluid_password_dev
      POSTGRES_DB: fluid_events
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluid_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluid-network

  # ============ Redis ============
  redis:
    image: redis:7-alpine
    container_name: fluid-events-redis
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluid-network

  # ============ Mailpit (Email Interceptor - Dev Only) ============
  mailpit:
    image: axllent/mailpit:latest
    container_name: fluid-events-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluid-network

  # ============ MinIO (S3-Compatible Storage - Dev) ============
  minio:
    image: minio/minio:latest
    container_name: fluid-events-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fluid-network

  # ============ Backend NestJS ============
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: fluid-events-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fluid_user:[REDACTED]@postgres:5432/fluid_events?schema=public
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: fluid-events
      STORAGE_REGION: us-east-1
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@fluid-events.dev
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      JWT_SECRET: dev-jwt-secret-change-in-prod
      JWT_EXPIRATION: 86400
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LOG_LEVEL: debug
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - /app/node_modules
      - /app/apps/api/dist
    ports:
      - "4000:4000"
      - "9229:9229"  # Debug port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fluid-network

  # ============ Frontend Next.js ============
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: fluid-events-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - /app/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - fluid-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fluid-network:
    driver: bridge
