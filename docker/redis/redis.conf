# Redis configuration for BullMQ, caching, sessions
# Production: Use Redis managé (Upstash, Railway, etc.)

# Max memory policy
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# AOF (Append-Only File) - optional, disable for speed
appendonly no

# TCP backlog
tcp-backlog 511

# TCP keepalive
tcp-keepalive 300

# Timeout
timeout 0

# Loglevel
loglevel notice

# Databases
databases 16

# Clients
maxclients 10000
