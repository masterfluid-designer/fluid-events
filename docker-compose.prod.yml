version: '3.8'

services:
  # ============ Nginx Reverse Proxy ============
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: fluid-events-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    networks:
      - fluid-network
    restart: always

  # ============ Backend NestJS (Production Build) ============
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: fluid-events-api
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}  # Supabase PostgreSQL
      REDIS_URL: ${REDIS_URL}  # Upstash ou Redis managé
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}  # Supabase Storage S3
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
    ports:
      - "4000:4000"
    networks:
      - fluid-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ Frontend Next.js (Production Build) ============
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: fluid-events-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - fluid-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  fluid-network:
    driver: bridge
