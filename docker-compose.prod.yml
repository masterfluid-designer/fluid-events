version: '3.8'

# Production override - à appliquer avec: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  # ============ Nginx Reverse Proxy (Prod Only) ============
  nginx:
    image: nginx:latest-alpine
    container_name: fluid-events-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    networks:
      - fluid-network

  # ============ PostgreSQL Production Override ============
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Dans production, utiliser Supabase PostgreSQL au lieu de ce container
    # Supprimer/commenter le volume pour éviter persistance locale
    volumes: []
    # Ne pas exposer le port en prod
    ports: []

  # ============ Redis Production Override ============
  redis:
    # En production, utiliser Redis managé (Upstash, Railway, etc.)
    environment:
      # Peut être supprimé et remplacé par REDIS_URL externe
      REDIS_URL: ${REDIS_URL}

  # ============ Backend Production Override ============
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}  # Supabase PostgreSQL
      REDIS_URL: ${REDIS_URL}        # Redis managé
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}  # Supabase Storage
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      SMTP_HOST: ${SMTP_HOST}        # Resend SMTP
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      LOG_LEVEL: info
    # Pas de volumes en prod (image immutable)
    volumes: []
    ports: []
    depends_on:
      - nginx
    restart: always

  # ============ Frontend Production Override ============
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    volumes: []
    ports: []
    depends_on:
      - nginx
    restart: always

  # ============ Disable dev-only services ============
  mailpit:
    profiles:
      - dev

  rustfs:
    profiles:
      - dev

networks:
  fluid-network:
    driver: bridge
